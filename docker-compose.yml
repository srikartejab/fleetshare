volumes:
  kong-pgdata:

x-backend-env: &backend-env
  PYTHONPATH: /app/packages/common/src:/app
  TZ: ${TZ:-Asia/Singapore}
  BILLING_TIMEZONE: ${BILLING_TIMEZONE:-Asia/Singapore}
  RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
  MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
  MINIO_BUCKET: ${MINIO_BUCKET:-fleetshare-evidence}
  DAMAGE_BOOKING_LOOKAHEAD_HOURS: ${DAMAGE_BOOKING_LOOKAHEAD_HOURS:-336}
  AZURE_VISION_MODE: ${AZURE_VISION_MODE:-mock}
  AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
  AZURE_OPENAI_KEY: ${AZURE_OPENAI_KEY:-}
  AZURE_OPENAI_DEPLOYMENT: ${AZURE_OPENAI_DEPLOYMENT:-gpt-4o-mini}
  AZURE_STORAGE_CONNECTION_STRING: ${AZURE_STORAGE_CONNECTION_STRING:-}
  VEHICLE_SERVICE_URL: http://vehicle-service:8000
  VEHICLE_GRPC_TARGET: vehicle-service:50051
  BOOKING_SERVICE_URL: http://booking-service:8000
  TRIP_SERVICE_URL: http://trip-service:8000
  RECORD_SERVICE_URL: http://record-service:8000
  MAINTENANCE_SERVICE_URL: http://maintenance-service:8000
  MAINTENANCE_BACKEND_MODE: ${MAINTENANCE_BACKEND_MODE:-outsystems}
  OUTSYSTEMS_MAINTENANCE_BASE_URL: ${OUTSYSTEMS_MAINTENANCE_BASE_URL:-https://personal-1p5qci9q.outsystemscloud.com/MaintenanceService/rest/maintenance}
  PRICING_SERVICE_URL: http://pricing-service:8000
  PAYMENT_SERVICE_URL: http://payment-service:8000
  NOTIFICATION_SERVICE_URL: http://notification-service:8000
  SEARCH_SERVICE_URL: http://search-available-vehicles-service:8000
  PROCESS_BOOKING_SERVICE_URL: http://process-booking-service:8000
  EXTERNAL_DAMAGE_SERVICE_URL: http://external-damage-service:8000
  START_TRIP_SERVICE_URL: http://start-trip-service:8000
  INTERNAL_DAMAGE_SERVICE_URL: http://internal-damage-service:8000
  END_TRIP_SERVICE_URL: http://end-trip-service:8000
  HANDLE_DAMAGE_SERVICE_URL: http://handle-damage-service:8000
  RENEWAL_RECONCILIATION_SERVICE_URL: http://renewal-reconciliation-service:8000
  RENTAL_EXECUTION_SERVICE_URL: http://rental-execution-service:8000
  OPS_CONSOLE_SERVICE_URL: http://ops-console-service:8000

services:
  mysql:
    image: mysql:8.4
    command:
      - mysqld
      - --innodb-buffer-pool-size=64M
      - --innodb-log-buffer-size=8M
      - --innodb-redo-log-capacity=33554432
      - --tmp-table-size=16M
      - --max-heap-table-size=16M
      - --table-open-cache=128
      - --performance_schema=OFF
      - --mysqlx=OFF
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-fleetshare_root}
      TZ: ${TZ:-Asia/Singapore}
    ports:
      - "3306:3306"
    volumes:
      - ./infrastructure/mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20

  rabbitmq:
    image: rabbitmq:3.13-management
    environment:
      TZ: ${TZ:-Asia/Singapore}
    ports:
      - "5672:5672"
      - "15672:15672"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
      TZ: ${TZ:-Asia/Singapore}
    ports:
      - "9000:9000"
      - "9001:9001"

  adminer:
    image: adminer:4
    environment:
      ADMINER_DEFAULT_SERVER: mysql
      TZ: ${TZ:-Asia/Singapore}
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

  kong-database:
    image: postgres:17.4
    environment:
      POSTGRES_DB: kong
      POSTGRES_USER: kong
      POSTGRES_PASSWORD: ${KONG_PG_PASSWORD:-password}
      TZ: ${TZ:-Asia/Singapore}
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "kong"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - kong-pgdata:/var/lib/postgresql/data

  kong-migration:
    image: kong/kong-gateway:3.9
    command: kong migrations bootstrap
    restart: on-failure
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: ${KONG_PG_PASSWORD:-password}
      TZ: ${TZ:-Asia/Singapore}
    depends_on:
      kong-database:
        condition: service_healthy

  kong:
    image: kong/kong-gateway:3.9
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: ${KONG_PG_PASSWORD:-password}
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_ADMIN_GUI_LISTEN: 0.0.0.0:8002
      KONG_ADMIN_GUI_URL: http://localhost:8002
      KONG_NGINX_MAIN_WORKER_PROCESSES: "2"
      TZ: ${TZ:-Asia/Singapore}
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8002:8002"
    depends_on:
      kong-migration:
        condition: service_completed_successfully
      process-booking-service:
        condition: service_started
      rental-execution-service:
        condition: service_started
      ops-console-service:
        condition: service_started

  kong-bootstrap:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: python infrastructure/kong/bootstrap.py
    restart: on-failure
    environment:
      PYTHONPATH: /app/packages/common/src:/app
      KONG_ADMIN_URL: http://kong:8001
      KONG_BOOTSTRAP_TIMEOUT_SECONDS: 90
      TZ: ${TZ:-Asia/Singapore}
    depends_on:
      kong:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: ${WEB_API_BASE_URL:-http://localhost:8000}
        VITE_OPS_API_KEY: ${VITE_OPS_API_KEY:-ops-demo-key-fleetshare}
    environment:
      TZ: ${TZ:-Asia/Singapore}

  vehicle-service:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: python -m uvicorn fleetshare_common.apps.vehicle_service:app --host 0.0.0.0 --port 8000
    environment:
      <<: *backend-env
      SERVICE_NAME: vehicle-service
      DATABASE_URL: mysql+pymysql://root:${MYSQL_ROOT_PASSWORD:-fleetshare_root}@mysql:3306/vehicle_db
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      minio:
        condition: service_started

  booking-service:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: python -m uvicorn fleetshare_common.apps.booking_service:app --host 0.0.0.0 --port 8000
    environment:
      <<: *backend-env
      SERVICE_NAME: booking-service
      DATABASE_URL: mysql+pymysql://root:${MYSQL_ROOT_PASSWORD:-fleetshare_root}@mysql:3306/booking_db
    depends_on:
      mysql:
        condition: service_healthy

  trip-service:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: python -m uvicorn fleetshare_common.apps.trip_service:app --host 0.0.0.0 --port 8000
    environment:
      <<: *backend-env
      SERVICE_NAME: trip-service
      DATABASE_URL: mysql+pymysql://root:${MYSQL_ROOT_PASSWORD:-fleetshare_root}@mysql:3306/trip_db
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_started

  record-service:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: python -m uvicorn fleetshare_common.apps.record_service:app --host 0.0.0.0 --port 8000
    environment:
      <<: *backend-env
      SERVICE_NAME: record-service
      DATABASE_URL: mysql+pymysql://root:${MYSQL_ROOT_PASSWORD:-fleetshare_root}@mysql:3306/record_db
    depends_on:
      mysql:
        condition: service_healthy

  maintenance-service:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: python -m uvicorn fleetshare_common.apps.maintenance_service:app --host 0.0.0.0 --port 8000
    environment:
      <<: *backend-env
      SERVICE_NAME: maintenance-service
      DATABASE_URL: mysql+pymysql://root:${MYSQL_ROOT_PASSWORD:-fleetshare_root}@mysql:3306/maintenance_db
    depends_on:
      mysql:
        condition: service_healthy

  pricing-service:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: python -m uvicorn fleetshare_common.apps.pricing_service:app --host 0.0.0.0 --port 8000
    environment:
      <<: *backend-env
      SERVICE_NAME: pricing-service
      DATABASE_URL: mysql+pymysql://root:${MYSQL_ROOT_PASSWORD:-fleetshare_root}@mysql:3306/pricing_db
    depends_on:
      mysql:
        condition: service_healthy

  payment-service:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: python -m uvicorn fleetshare_common.apps.payment_service:app --host 0.0.0.0 --port 8000
    environment:
      <<: *backend-env
      SERVICE_NAME: payment-service
      DATABASE_URL: mysql+pymysql://root:${MYSQL_ROOT_PASSWORD:-fleetshare_root}@mysql:3306/payment_db
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_started

  notification-service:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: python -m uvicorn fleetshare_common.apps.notification_service:app --host 0.0.0.0 --port 8000
    environment:
      <<: *backend-env
      SERVICE_NAME: notification-service
      DATABASE_URL: mysql+pymysql://root:${MYSQL_ROOT_PASSWORD:-fleetshare_root}@mysql:3306/notification_db
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_started

  search-available-vehicles-service:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: python -m uvicorn fleetshare_common.apps.search_available_vehicles_service:app --host 0.0.0.0 --port 8000
    environment:
      <<: *backend-env
      SERVICE_NAME: search-available-vehicles-service
    depends_on: [vehicle-service, booking-service, pricing-service]

  process-booking-service:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: python -m uvicorn fleetshare_common.apps.process_booking_service:app --host 0.0.0.0 --port 8000
    environment:
      <<: *backend-env
      SERVICE_NAME: process-booking-service
    depends_on: [vehicle-service, booking-service, pricing-service, payment-service]

  rental-execution-service:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: python -m uvicorn fleetshare_common.apps.rental_execution_service:app --host 0.0.0.0 --port 8000
    environment:
      <<: *backend-env
      SERVICE_NAME: rental-execution-service
    depends_on:
      - vehicle-service
      - booking-service
      - trip-service
      - record-service
      - external-damage-service
      - start-trip-service
      - internal-damage-service
      - end-trip-service

  external-damage-service:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: python -m uvicorn fleetshare_common.apps.external_damage_service:app --host 0.0.0.0 --port 8000
    environment:
      <<: *backend-env
      SERVICE_NAME: external-damage-service
    depends_on: [record-service, vehicle-service,  rabbitmq]

  start-trip-service:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: python -m uvicorn fleetshare_common.apps.start_trip_service:app --host 0.0.0.0 --port 8000
    environment:
      <<: *backend-env
      SERVICE_NAME: start-trip-service
    depends_on: [trip-service, booking-service, record-service, internal-damage-service, vehicle-service]

  internal-damage-service:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: python -m uvicorn fleetshare_common.apps.internal_damage_service:app --host 0.0.0.0 --port 8000
    environment:
      <<: *backend-env
      SERVICE_NAME: internal-damage-service
    depends_on: [record-service, vehicle-service, rabbitmq]

  end-trip-service:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: python -m uvicorn fleetshare_common.apps.end_trip_service:app --host 0.0.0.0 --port 8000
    environment:
      <<: *backend-env
      SERVICE_NAME: end-trip-service
    depends_on: [trip-service, booking-service, pricing-service, vehicle-service, rabbitmq]

  handle-damage-service:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: python -m uvicorn fleetshare_common.apps.handle_damage_service:app --host 0.0.0.0 --port 8000
    environment:
      <<: *backend-env
      SERVICE_NAME: handle-damage-service
    depends_on:
      rabbitmq:
        condition: service_started
      maintenance-service:
        condition: service_started
      booking-service:
        condition: service_started

  renewal-reconciliation-service:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: python -m uvicorn fleetshare_common.apps.renewal_reconciliation_service:app --host 0.0.0.0 --port 8000
    environment:
      <<: *backend-env
      SERVICE_NAME: renewal-reconciliation-service
    depends_on:
      rabbitmq:
        condition: service_started
      booking-service:
        condition: service_started
      trip-service:
        condition: service_started
      pricing-service:
        condition: service_started

  ops-console-service:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: python -m uvicorn fleetshare_common.apps.ops_console_service:app --host 0.0.0.0 --port 8000
    environment:
      <<: *backend-env
      SERVICE_NAME: ops-console-service
    depends_on:
      - vehicle-service
      - booking-service
      - trip-service
      - record-service
      - maintenance-service
      - pricing-service
      - payment-service
      - notification-service
      - renewal-reconciliation-service
